{#-
  One-shot migratie: wist Material's opgeslagen palet zodat HTML-default (eerste palette in mkdocs.yml) weer geldt.
  Verhoog extra.palette_migration in mkdocs.yml als je dit opnieuw voor alle bezoekers wilt afdwingen.
-#}
<script>
(function () {
  var version = "{{ config.extra.palette_migration | d('2026-03-21-dark-default', true) | e }}";
  var migKey = "pollenid.palette_mig";
  try {
    if (localStorage.getItem(migKey) !== version) {
      var scope = new URL("{{ config.extra.scope | d(base_url) }}", location);
      localStorage.removeItem(scope.pathname + ".__palette");
      localStorage.setItem(migKey, version);
    }
  } catch (e) {}
})();
</script>
