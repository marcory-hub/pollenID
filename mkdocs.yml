site_name: PollenID
site_url: https://marcory-hub.github.io/pollenID/

# Backlog staat bewust op naslag/raw-documenten-overzicht.md (script), niet in de console-log.
validation:
  nav:
    omitted_files: ignore

extra:
  palette_migration: "2026-03-21-dark-default"

theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: slate
      toggle:
        icon: material/brightness-7
        name: Schakel naar licht thema
    - scheme: default
      toggle:
        icon: material/brightness-4
        name: Schakel naar donker thema
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.instant.preview
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top

plugins:
  - search:
      lang: nl
  - tags



extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - microscopie:
      - overzichtvergroting: palynologie-paginas/overzichtsvergroting.md
      - detailvergroting: palynologie-paginas/detailvergroting.md
      - kristallen in honing: palynologie-paginas/kristallen-in-honing.md
  - pollen determineren:
      - monoflorale honing: palynologie-paginas/monoflorale-honing.md
      - nederlandse pollen: palynologie-paginas/pollen_in_nl_honing.md
      - secundaire inbreng: palynologie-paginas/secundaire-inbreng.md
      - vergelijken: palynologie-paginas/pollen-vergelijkingen.md
      - verdiepingsset: palynologie-paginas/verdieping.md
  - naslag:
      - Referenties: naslag/referenties.md


