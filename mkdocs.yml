site_name: PollenID
site_url: https://marcory-hub.github.io/pollenID/

validation:
  nav:
    omitted_files: ignore

extra:
  palette_migration: "2026-03-21-dark-default"

theme:
  name: material
  favicon: assets/images/favicon.png
  palette:
    - scheme: slate
      toggle:
        icon: material/brightness-7
        name: Schakel naar licht thema
    - scheme: default
      toggle:
        icon: material/brightness-4
        name: Schakel naar donker thema
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.instant.preview
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top

plugins:
  - search:
      lang: nl
  - tags
  - macros

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/pollentabel.js?v=2026-07-18-rename
  - javascripts/kerkvliet-determinatietabel.js?v=2026-05-07-2028
  - javascripts/palynoquest.js?v=2026-07-12

nav:
  - Home: index.md
  - Keys: Identificatiesleutels/_index.md
  - Gallerie:
      - Overzicht: gallerie/_index.md
      - "Veel voorkomend (NL)": gallerie/gallery-nl-common.md
      - "Makkelijk herkenbaar (NL)": gallerie/gallery-nl-easy.md
      - Pollentypen: gallerie/gallery-nl-pollen-types.md
      - "Secundaire inbreng (NL)": gallerie/gallery-nl-secondary.md
      - "Minder algemeen (NL)": gallerie/gallery-nl-less-common.md
      - "EU buiten NL": gallerie/gallery-eu-non-nl.md
      - "Buiten EU": gallerie/gallery-non-eu.md
      - "Non-pollen": gallerie/gallery-non-pollen.md
      - Lookalikes: lookalikes/_index.md
  - Willekeurig: naslag/palynoquest.md
  - Monofloraal:
      - Overzicht: monoflorale-honing-pollen/_index.md
      - Zonnebloem (Helianthus annuus): monoflorale-honing-pollen/zonnebloemhoning.md
      - Witte klaver: monoflorale-honing-pollen/witte-klaverhoning.md
      - Wilg: monoflorale-honing-pollen/wilghoning.md
      - Valse acacia (Robinia pseudoacacia): monoflorale-honing-pollen/valse-acacia.md
      - Tijm: monoflorale-honing-pollen/tijmhoning.md
      - Tamme kastanje: monoflorale-honing-pollen/tammekastanjehoning.md
      - Rosemarijn: monoflorale-honing-pollen/rosemarijnhoning.md
      - Rode klaver: monoflorale-honing-pollen/rode-klaverhoning.md
      - Rhododendron: monoflorale-honing-pollen/rhododendronhoning.md
      - Phacelia: monoflorale-honing-pollen/phaceliahoning.md
      - Paardenbloem (Taraxacum officinale): monoflorale-honing-pollen/paardenbloemhoning.md
      - Linde: monoflorale-honing-pollen/lindehoning.md
      - Liguster (Ligustrum vulgare): monoflorale-honing-pollen/ligusterhoning.md
      - Lavendel: monoflorale-honing-pollen/lavendelhoning.md
      - Koolzaad: monoflorale-honing-pollen/koolzaadhoning.md
      - Heide: monoflorale-honing-pollen/heidehoning.md
      - Eucalyptus: monoflorale-honing-pollen/eucalyptushoning.md
      - Citrus: monoflorale-honing-pollen/citrushoning.md
      - Braam: monoflorale-honing-pollen/braamhoning.md
      - Boekweit: monoflorale-honing-pollen/boekweithoning.md
  - Naslag:
      - Overzicht: naslag/_index.md
      - Synoniemen en basioniemen: naslag/synoniemen-en-basioniemen.md
      - Pollen kleurprotocollen: naslag/pollen-staining-protocols.md
      - Scripts: naslag/scripts.md


