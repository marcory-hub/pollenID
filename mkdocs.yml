site_name: PollenID
site_url: https://marcory-hub.github.io/pollenID/
extra:
  # Verhoog deze waarde om bij iedereen opnieuw de standaard (eerste palette) af te dwingen.
  palette_migration: "2026-03-21-dark-default"

theme:
  name: material
  custom_dir: overrides
  palette:
    # Eerste schema = standaard bij eerste bezoek (donker)
    - scheme: slate
      toggle:
        icon: material/brightness-7
        name: Schakel naar licht thema
    - scheme: default
      toggle:
        icon: material/brightness-4
        name: Schakel naar donker thema
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.instant.preview
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    # - toc.integrate

plugins:
  - search:
      lang: nl
  - tags:
      tags_file: tags.md



extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Overzichtsvergroting:
      - 10× vergroting: overzichtsvergroting/overzichtsvergroting(10x).md
  - Detailvergroting:
      - 40× vergroting: detailvergroting/detailvergroting(40x).md
  - Monoflorale honing:
      - Lindehoning: monoflorale-honing/lindehoning.md
      - Koolzaadhoning: monoflorale-honing/koolzaadhoning.md
  - Achtergrond informatie:
      - Geschiedenis: achtergrond-informatie/geschiedenis.md
      - Terminologie: achtergrond-informatie/terminologie.md
      - Bronnen: achtergrond-informatie/bronnen.md
  - Tags: tags.md