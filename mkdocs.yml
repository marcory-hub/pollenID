site_name: PollenID
site_url: https://marcory-hub.github.io/pollenID/

# Backlog staat bewust op naslag/raw-documenten-overzicht.md (script), niet in de console-log.
validation:
  nav:
    omitted_files: ignore

extra:
  palette_migration: "2026-03-21-dark-default"

theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: slate
      toggle:
        icon: material/brightness-7
        name: Schakel naar licht thema
    - scheme: default
      toggle:
        icon: material/brightness-4
        name: Schakel naar donker thema
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.instant.preview
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top

plugins:
  - search:
      lang: nl
  - tags



extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - microscopie:
      - overzichtvergroting: pollen-pages/overzichtsvergroting.md
      - detailvergroting: pollen-pages/detailvergroting.md
  - pollen determineren:
      - monoflorale honing: pollen-pages/monoflorale-honing.md
      - nederlandse pollen: pollen-pages/pollen_in_nl_honing.md
      - vergelijken: pollen-pages/pollen-vergelijkingen.md
      - verdiepingsset: pollen-pages/verdieping.md
      - Pollen-Wiki (verdieping):
          - Bestimmungshulp pollenklassen: pollen-determineren/verdiepingsset/bestimmungshulp-pollenklassen.md
          - Pollenkalender interpretatie: pollen-determineren/verdiepingsset/pollenkalender-interpretatie.md
          - Gattung-prioritering: pollen-determineren/verdiepingsset/gattung-prioritering.md

  - naslag:
      - Referenties: naslag/referenties.md
      - Vergelijking determinatiesleutels: naslag/vergelijking-determinatie-sleutels.md
      - Kristallen in honing: naslag/kristallen-in-honing.md
      - Tags: tags.md


