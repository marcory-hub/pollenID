site_name: PollenID
site_url: https://marcory-hub.github.io/pollenID/

# Backlog staat bewust op naslag/raw-documenten-overzicht.md (script), niet in de console-log.
validation:
  nav:
    omitted_files: ignore

extra:
  palette_migration: "2026-03-21-dark-default"

theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: slate
      toggle:
        icon: material/brightness-7
        name: Schakel naar licht thema
    - scheme: default
      toggle:
        icon: material/brightness-4
        name: Schakel naar donker thema
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.instant.preview
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top

plugins:
  - search:
      lang: nl
  - tags



extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - vliegroute: vliegroute.md

  - RAW:
      - Documentenoverzicht: naslag/raw-documenten-overzicht.md

  - microscopie:
      - overzichtvergroting: pollen-determineren/verdiepingset-herkenning/overzichtsvergroting.md
      - detailvergroting: pollen-determineren/verdiepingset-herkenning/detailvergroting.md

  - pollen determineren:
      - kernset: kernset.md
      - vergelijken: pollen-vergelijkingen.md
      - verdiepingsset: verdieping.md
      - Pollen-Wiki (verdieping):
          - Bestimmungshulp pollenklassen: pollen-determineren/verdiepingset-herkenning/bestimmungshulp-pollenklassen.md
          - Pollenkalender interpretatie: pollen-determineren/verdiepingset-herkenning/pollenkalender-interpretatie.md
          - Gattung-prioritering: pollen-determineren/verdiepingset-herkenning/gattung-prioritering.md

  - naslag:
      - Cursussen en materiaal: naslag/cursussen-en-materiaal.md
      - Boeken en handleidingen: naslag/boeken-en-handleidingen.md
      - Bestimmungshulp en categorieën: naslag/bestimmungshulp-en-categorieen.md
      - Beug sleutelgebruik en morfometrie: naslag/beug-sleutelgebruik-en-morfometrie.md
      - Beug poaceae fasecontrast: naslag/beug-poaceae-fasecontrast.md
      - Verzamelkalender pollen: naslag/verzamelkalender-pollen.md
      - Databases (online): naslag/pollen-databases.md
      - Veelvoorkomende geslachten (gattung): naslag/veelvoorkomende-gattungen.md
      - Doel van pollenanalyse: naslag/doel-pollen-analyse.md
      - Monoflorale honing: naslag/monoflorale-honing.md
      - Terminologie en morfologie: naslag/terminologie.md
      - Fægri en Iversen (determinatiesleutel): naslag/faegri-iversen-determinatiesleutel.md
      - Fægri en Iversen (terminologie): naslag/faegri-iversen-terminologie.md
      - Families herkennen: naslag/families-herkennen.md
      - Pollen uit honing halen: naslag/preparaat-maken/pollen-uit-honing-halen.md
      - Kleuringen: naslag/preparaat-maken/kleuringen.md
      - Insluitmiddelen: naslag/preparaat-maken/glycerine-gelatine-insluitmiddel.md
      - Microscoopgebruik: naslag/microscoop/gebruik-microscoop.md
      - Microscopie en fotografie: naslag/microscoop/microscopie-fotografie.md
      - Wat noteren bij pollenobservatie: naslag/wat-noteren-bij-pollenobservatie.md
      - Geschiedenis: naslag/geschiedenis.md
      - Instituten en organisaties: naslag/instituten-en-organisaties.md
      - Warting en beheer: naslag/warting-en-beheer.md
      - Tags: tags.md


